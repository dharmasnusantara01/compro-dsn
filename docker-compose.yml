services:
  mysql:
    image: mysql:8.0
    container_name: compro_dsn_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: compro_dsn
      MYSQL_USER: dsn
      MYSQL_PASSWORD: dsn_secret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "dsn", "-pdsn_secret"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: compro_dsn_phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_USER: dsn
      PMA_PASSWORD: dsn_secret
    ports:
      - "8080:80"

volumes:
  mysql_data:
    driver: local
